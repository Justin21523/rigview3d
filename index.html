<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RigView3D</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">RigView3D</div>
        <button id="btn-reset-camera" class="btn">Reset Camera</button>
      </header>
      <div class="main">
        <aside class="sidebar">
          <section class="panel">
            <h2 class="panel-title">Load</h2>
            <div
              id="dropzone"
              class="dropzone"
              role="button"
              tabindex="0"
              aria-label="Drop GLB/GLTF files here or click to select"
            >
              <div class="dropzone-title">Drop a .glb/.gltf here</div>
              <div class="dropzone-subtitle">or click to browse</div>
              <div class="dropzone-hint">
                For .gltf, drop the .gltf + .bin + textures together.
              </div>
            </div>
            <input
              id="file-input"
              type="file"
              hidden
              multiple
              accept=".glb,.gltf,.bin,.png,.jpg,.jpeg,.webp"
            />
          </section>

          <section class="panel">
            <h2 class="panel-title">Info</h2>
            <dl class="info-grid">
              <dt>File</dt>
              <dd id="info-file">—</dd>
              <dt>Meshes</dt>
              <dd id="info-meshes">—</dd>
              <dt>Materials</dt>
              <dd id="info-materials">—</dd>
              <dt>Bones</dt>
              <dd id="info-bones">—</dd>
              <dt>Clips</dt>
              <dd id="info-clips">—</dd>
            </dl>
          </section>

          <section class="panel">
            <h2 class="panel-title">Animation</h2>

            <label class="field">
              <span class="field-label">Clip</span>
              <select id="anim-clip" class="select" disabled></select>
            </label>

            <div class="row">
              <button id="anim-play" class="btn btn-small" disabled>Play</button>
              <button id="anim-pause" class="btn btn-small" disabled>Pause</button>
              <button id="anim-stop" class="btn btn-small" disabled>Stop</button>
            </div>

            <label class="field">
              <span class="field-label">Speed</span>
              <input
                id="anim-speed"
                class="range"
                type="range"
                min="0.25"
                max="2"
                step="0.05"
                value="1"
                disabled
              />
              <span id="anim-speed-value" class="field-value">1.00x</span>
            </label>

            <label class="checkbox">
              <input id="anim-loop" type="checkbox" checked disabled />
              <span>Loop</span>
            </label>
          </section>

          <section class="panel">
            <h2 class="panel-title">Debug</h2>
            <label class="checkbox">
              <input id="dbg-grid" type="checkbox" checked />
              <span>Grid</span>
            </label>
            <label class="checkbox">
              <input id="dbg-axes" type="checkbox" checked />
              <span>Axes</span>
            </label>
            <label class="checkbox">
              <input id="dbg-skeleton" type="checkbox" disabled />
              <span>Skeleton</span>
            </label>
            <label class="checkbox">
              <input id="dbg-wireframe" type="checkbox" disabled />
              <span>Wireframe</span>
            </label>
          </section>
        </aside>

        <main class="viewport">
          <canvas id="c"></canvas>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
